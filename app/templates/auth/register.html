{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card shadow-sm border-0">
        <div class="card-body p-4 p-sm-5">
            <div class="text-center mb-4">
                <i class="bi bi-journal-text text-primary fs-1"></i>
                <h4 class="fw-bold mt-3">Register</h4>
                <p class="text-secondary text-sm">Create your account to get started</p>
            </div>

            <form action="" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label text-secondary small fw-bold">USERNAME</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="bi bi-person text-secondary"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0 bg-light" id="username"
                            name="username" placeholder="Choose a username" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label text-secondary small fw-bold">EMAIL</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="bi bi-envelope text-secondary"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0 bg-light" id="email" name="email"
                            placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label text-secondary small fw-bold">PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="bi bi-lock text-secondary"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0 bg-light" id="password"
                            name="password" placeholder="Create a password" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="role" class="form-label text-secondary small fw-bold">ROLE</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="bi bi-person-badge text-secondary"></i></span>
                        <select class="form-control border-start-0 ps-0 bg-light form-select" id="role" name="role">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <!-- <div class="form-text small mt-1"><i class="bi bi-info-circle"></i> For demonstration purposes only.
                    </div> -->
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary py-2 text-uppercase fw-bold text-sm">Sign Up</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="text-secondary small mb-0">Already have an account?</p>
                <a href="{{ url_for('auth.login') }}" class="fw-bold text-decoration-none">Sign In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
